kibot:
  version: 1

outputs:
  - name: PCB_top_render
    comment: Render PCB top side
    type: pcbdraw
    options:
      format: png
      show_components: all
      output: output/%f_pcb_top.png
  - name: PCB_bottom_render
    comment: Render PCB bottom side
    type: pcbdraw
    options:
      format: png
      show_components: all
      bottom: true
      output: output/%f_pcb_bottom.png
  - name: Schematic_PDF
    comment: Render schematic
    type: pdf_sch_print
    options:
      output: output/%f_schematic.pdf
  - name: Blender 3D
    comment: Blender 3D
    type: blender_export
    options:
      render_options:
        samples: 10
        transparent_background: true
      pcb_import:
        solder_joints: ALL
      light:
        - name: Main light
          energy: 0
          type: SUN
      outputs:
        - type: render
          output: output/%f_blender.png
      point_of_view:
        - rotate_y: 30
          rotate_z: 30